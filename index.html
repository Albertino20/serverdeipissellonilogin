<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>serverdeipisselloni - Server PvP</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        header {
            padding: 40px;
            font-size: 40px;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
        }

        .box {
            margin: 30px auto;
            padding: 20px;
            width: 80%;
            max-width: 600px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #00ff99;
            color: black;
            font-weight: bold;
        }

        button:hover {
            background: #00cc77;
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            background: rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<header>
    ⚔️  serverdeipisselloni - Server PvP ⚔️
</header>

<div class="box">
    <h2>🔥 Entra nel nostro server!</h2>
    <p>Modalità: Lobby • kitpvp • survival • PvP</p>
    <p><strong>IP:</strong> serverdeipisselloni.aternos.me</p>
    

<div class="box">
    <h2>📊 Stato Server</h2>
       <p>Versione: 1.21.5</p>
</div><input type="text" id="ip" value="serverdeipisselloni.aternos.me" readonly>
<button onclick="copiaIP()">Copia IP</button>

<script>
function copiaIP() {
  const input = document.getElementById("ip");
  input.select();
  input.setSelectionRange(0, 99999); 
  navigator.clipboard.writeText(input.value);
  alert("IP copiato!");
}
</script>

<footer>
    © 2026 serverdeipisselloni - Tutti i diritti riservati
</footer>

</body>
</html>
