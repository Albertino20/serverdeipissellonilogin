<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Login</h2>
    <form onsubmit="login(event)">
        <input type="text" id="Email" placeholder="Email" required>
        <input type="password" id="Password" placeholder="Password" required>
        <button type="submit">Accedi</button>
    </form>
    <p id="msg"></p>
</div>

<script>
function login(event) {
    event.preventDefault();

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    let savedUser = localStorage.getItem("user");

    if (username === savedUser) {
        document.getElementById("msg").innerText = "Login riuscito!";
        // Redirect (facoltativo)
        // window.location.href = "dashboard.html";
    } else {
        document.getElementById("msg").innerText = "Utente non trovato!";
    }
}
</script>

</body>
</html>
